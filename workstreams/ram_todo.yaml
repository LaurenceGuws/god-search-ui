items:
  - id: RAM-01
    title: Establish reproducible RAM baseline for daemon lifecycle
    status: completed
    owner: shell
    files:
      - src/main.zig
      - re-run.sh
    done:
      - Confirmed repository workflow/docs and todo format.
      - Confirmed current branch/state before RAM audit.
      - Added end-to-end runbook and measurable artifact set.
      - Added `scripts/ram_usage_audit.sh` to run a phased capture and collect daemon evidence.
      - Captured single-process phased baseline with `scripts/ram_usage_audit.sh`.
      - Recorded deterministic deltas from `/tmp/god-search-ui-ram-baseline.csv`:
        - startup: RSS 227900 KB, PSS 114073 KB
        - after_query (`& import`): RSS 1124624 KB, PSS 1010529 KB
        - after_clear: RSS 1121904 KB, PSS 1007781 KB
        - after_hide: RSS 441656 KB, PSS 320126 KB
        - after_reopen: RSS 228312 KB, PSS 114189 KB
      - Captured matching lifecycle logs in `/tmp/god-search-ui-ram-daemon-log.txt`.
    todo: []
    notes: |
      This item is evidence-only; no behavior changes allowed.
      Command sequence:
      - `pkill -f 'god_search_ui --ui-daemon' || true`
      - `./re-run.sh`
      - `pgrep -fa god_search_ui`
      - `date --iso-8601=seconds`
      - `pid=<PID_FROM_PGREP>`
      - `awk '/VmRSS|VmHWM|VmSize/ {print}` `/proc/$pid/status`
      - `awk '/Pss:/ {print "PSS_KB=" $2}' /proc/$pid/smaps_rollup`
      - Use daemon control to apply phases: idle, heavy query, clear, hide, reopen.
      - `./zig-out/bin/god_search_ui --ctl hide`
      - `./zig-out/bin/god_search_ui --ctl summon`
      - `tail -n 400 ~/.local/state/god-search-ui/daemon.log`
      Mandatory logging columns:
      - `timestamp` `phase` `pid` `VmRSS_kb` `VmHWM_kb` `VmSize_kb` `PSS_kb` `query` `ui_visible`
      Evidence artifacts:
      - `/tmp/god-search-ui-ram-baseline.csv`
      - `/tmp/god-search-ui-ram-daemon-log.txt`
      Completion criteria:
      - All phases captured with one process and one CSV.
      - One deterministic observed delta for baseline, post-query peak, post-hide, and post-reopen.

  - id: RAM-02
    title: Trace dynamic route retention and release semantics
    status: completed
    owner: shell
    files:
      - src/app/search_service.zig
      - src/app/search_service/dynamic_query_engine.zig
      - src/app/search_service/dynamic_generations.zig
      - src/app/search_service/dynamic_routes.zig
    done:
      - Identified dynamic generation retention path and grep cap boundaries.
      - Confirmed prune and release hooks are only in service scope.
      - Fixed dynamic generation leak by deallocating nested owned buffers on prune/clear/remove.
      - Added post-clear visibility of dynamic cache counts/bytes in `clearDynamicState` logs.
      - Added crash-safe clear semantics in `clearDynamicState` (pin-aware pruning) to avoid freeing in-flight generations.
      - Updated clear log path to avoid no-op spam while preserving actionable clear events.
      - Added structured RAM event log for dynamic route completion in `dynamic_query_engine.zig`.
      - Added clear-event RAM accounting in `search_service.zig` (`dynamic_cache_clear` event).
      - Verified lifecycle from daemon evidence:
        - submit (`& import`): `ram_event=dynamic_route_complete ... generation_count=1 ... owned_bytes=46319124`
        - clear query: no dynamic clear event; generation retained while UI visible
        - hide: `ram_event=ui_hide ...` followed by `ram_event=dynamic_cache_clear ... pruned_count=1`
        - reopen: `ram_event=ui_summon ...` with dynamic generation already cleared
      - Confirmed explicit answer for retention:
        - memory persists after clear because dynamic generation is not cleared on empty query by policy
        - memory is released on hide/close path via dynamic clear
    todo: []
    notes: |
      Must be backed by explicit logs and code proof.
      Code proof anchors:
      - `src/app/search_service.zig` (`dynamic_generation_keep`)
      - `src/app/search_service/dynamic_query_engine.zig` (`prune`, `finishPinned` lifecycle)
      - `src/app/search_service/dynamic_generations.zig` (`prune`, `clear`, ownership release)
      - `src/app/search_service/dynamic_routes.zig` (`max_rg_capture_bytes`, `runShellCaptureBounded`, emitted/parsed counts)
      Completion criteria:
      - Event/state matrix filled with phase evidence lines.
      - At least one repeated same-query cycle with observable generation behavior.
      - Explicit answer: why memory persists after hide.
      Acceptance gate:
      - `dynamic_gen_count` and `dynamic_bytes_live` are directly measurable from logs.

  - id: RAM-03
    title: Separate UI-side cache impact from service-side retention
    status: completed
    owner: shell
    files:
      - src/ui/gtk/async_search.zig
      - src/ui/gtk/async_state.zig
      - src/ui/gtk/results_flow.zig
      - src/ui/gtk/shell_lifecycle.zig
    done:
      - Confirmed async cache and result rows have fixed caps.
      - Confirmed async cache is cleared on query changes and window destruction.
      - Kept dynamic result streaming cache at fixed `max_cached_rows` with truncation logs for over-cap rows.
      - Added RAM attribution logs for async cache store events with query metadata.
      - Added control-path logs for summon/hide/close and retained-window position for lifecycle traceability.
      - Validated UI cache bound under heavy grep:
        - `ram_event=async_cache_store ... emitted_rows=200 ... cached_rows=200 ... cached_bytes=60482`
      - Validated service-side dynamic retention:
        - `ram_event=dynamic_route_complete ... owned_bytes=46319124`
      - Correlated memory attribution:
        - Peak PSS around 1.01 GB is dominated by in-flight collection/ranking and dynamic route processing, not UI cache.
      - Confirmed evidence artifacts from one automated run:
        - `/tmp/god-search-ui-ram-baseline.csv`
        - `/tmp/god-search-ui-ram-daemon-log.txt`
    todo: []
    notes: |
      Goal is attribution clarity before optimization decisions.
      Required output:
      - Table columns: `bucket`, `estimated_kb`, `evidence_source`, `confidence`.
      - One line determining dominant memory bucket for 1.1GB+ symptom.
      Attribution table:
      - `bucket=ui_async_cache`, `estimated_kb=59`, `evidence_source=ram_event=async_cache_store cached_bytes=60482`, `confidence=high`
      - `bucket=dynamic_owned_generation`, `estimated_kb=45233`, `evidence_source=ram_event=dynamic_route_complete owned_bytes=46319124`, `confidence=high`
      - `bucket=inflight_rg_capture_and_parse_rank_working_set`, `estimated_kb=900000+`, `evidence_source=PSS peak 1010529 KB with owned_bytes 46319124`, `confidence=medium`
      Dominant bucket conclusion:
      - The 1.1 GB symptom is dominated by in-flight grep capture/parse/rank working set, not UI cache.
      Completion criteria:
      - UI cache remains bounded and quantified.
      - Service dynamic vs UI cache attribution is clear and non-ambiguous.
    acceptance_gate:
      - UI cache contribution is bounded and measured during test runs.
      - Dominant contributor must be identified with source references.

  - id: RAM-04
    title: Define release-policy candidates and tradeoffs
    status: completed
    owner: shell
    files:
      - src/app/search_service.zig
      - src/ui/gtk_shell.zig
      - src/ui/gtk/shell_lifecycle.zig
    done:
      - Created policy decision template and policy-score criteria.
      - Started policy matrix with hide/close and empty-query clearance as highest-priority candidates for trial.
      - Drafted and scored policy candidates:
        - hide/close clear: RSS drop high, latency impact low (after deferred clear), UX risk low
        - empty-query clear: RSS drop medium-high, latency impact low, UX risk medium (breaks immediate reopen cache continuity)
        - route-change clear (away from dynamic): RSS drop medium, latency impact low, UX risk low-medium
        - idle clear (timer): RSS drop medium, latency impact low, UX risk medium (surprise recalc)
        - manual ctl clear: RSS drop explicit/manual, latency impact none until used, UX risk low
      - Selected rollout order:
        - 1) hide/close clear (active)
        - 2) optional empty-query clear behind config
        - 3) route-change clear
        - 4) idle clear
        - 5) manual ctl clear
    todo: []
    notes: |
      Design-only step; no code edits until policy approved by user.
      For each policy capture:
      - Trigger
      - What is freed
      - When it runs
      - Expected RSS effect
      - Latency impact on next query
      - UX regression risk
      - Rollback condition
      Completion criteria:
      - At least 3 scored candidates.
      - One recommended policy with rationale from RAM-01..03.

  - id: RAM-05
    title: Add observability gates required before optimization
    status: completed
    owner: shell
    files:
      - src/app/search_service.zig
      - src/app/search_service/dynamic_generations.zig
      - src/app/search_service/dynamic_routes.zig
      - src/ui/gtk/results_flow.zig
    done:
      - Finalized required RAM event schema and threshold placeholders.
      - Added dynamic prune/cap/route completion logs in `dynamic_query_engine` and clear-state logs in service layer.
      - Added zero-result no-op suppression in clear logs to keep signal-to-noise ratio in lifecycle evidence.
      - Finalized schema fields/units and logged events:
        - `ram_event=dynamic_route_complete`
        - `ram_event=dynamic_cache_clear`
        - `ram_event=async_cache_store`
        - `ram_event=ui_summon|ui_hide|ui_toggle_hide|ui_toggle_show|ui_close_request|ui_focus_lost_hide`
      - Defined operational guardrails:
        - `async_cached_rows <= 200` hard bound
        - `post_hide_drop_ratio >= 0.25` when hide-clear active
        - `dynamic_cache_clear` must follow hide/close and prune at least one generation after heavy dynamic query
      - Defined pass/fail baseline check command:
        - `./scripts/ram_usage_audit.sh` + inspect `/tmp/god-search-ui-ram-baseline.csv`
    todo: []
    notes: |
      Logging and tests should be implemented before/with first optimization slice.
      Required fields: `ram_event`, `query_hash`, `route`, `query_term_len`, `emitted_rows`, `owned_item_count`, `owned_bytes`, `generation_count`, `pruned_count`, `window_limit`, `cached_rows`, `cached_bytes`.
      Acceptance threshold examples:
      - `post_hide_drop_ratio >= 0.25` when hide-clear policy active.
      - `steady_state_dynamic_bytes <= 2 * max_rg_capture_bytes`.
      - `async_cached_rows <= max_cached_rows` (hard bound by code).
      Completion criteria:
      - Thresholds approved before any optimization code.
      - Metrics and thresholds documented in this file and linked to commands.
