name: CI

on:
  push:
  pull_request:

jobs:
  zig:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Format check
        run: zig fmt --check src build.zig

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

      - name: Release Validate CI Guard
        run: scripts/check_release_validate_ci.sh
